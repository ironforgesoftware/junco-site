<!DOCTYPE html>

        width: 1200px;

      .og .kicker {

        line-height: 1.25;

      .og .pos {
        color: var(--ink-muted);

        max-width: 46ch;
      }
      .og .foot-row {
        display: flex;
        align-items: center;
        gap: 1.5ch;
        font-size: 1.25rem;
        color: var(--ink-muted);
      }
      .og .mark {
        display: inline-block;
        width: 44px;
        height: 35px;
