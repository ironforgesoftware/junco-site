<!DOCTYPE html>
<html lang="en" data-theme="dark" class="js">
  <head>
    <meta charset="utf-8">
    <title>og-image source — screenshot at 1200×630</title>
    <link rel="stylesheet" href="site/styles.css">
    <style>
      html,
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }
      .og {
        width: 1200px;
        height: 630px;
        padding: 72px 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        border-top: 6px solid var(--accent);
      }
      .og .kicker {
        font-size: 1.125rem;
      }
      .og h1 {
        font-size: 4.5rem;
        line-height: 1.25;
        margin-block: 0.5rem 1.5rem;
      }
      .og .pos {
        color: var(--ink-muted);
        font-size: 1.375rem;
        max-width: 46ch;
      }
      .og .foot-row {
        display: flex;
        align-items: center;
        gap: 1.5ch;
        font-size: 1.25rem;
        color: var(--ink-muted);
      }
      .og .mark {
        display: inline-block;
        width: 36px;
        height: 36px;
      }
    </style>
  </head>
  <body>
    <div class="og">
      <div>
        <p class="kicker">junco · field spec · v0.4.0 · MIT</p>
        <h1>Markdown tickets in.<br>Pull requests out.</h1>
        <p class="pos">
          A harness-agnostic task-queue worker that turns Markdown tickets into git pull requests
          by driving a coding agent.
        </p>
      </div>
      <p class="foot-row">
        <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
          <circle fill="#dfe3ea" cx="14" cy="16" r="11" />
          <path fill="#eb6f92" d="M23 12 L31 16 L23 20 Z" />
        </svg>
        junco.ironforgesoftware.com
      </p>
    </div>
  </body>
</html>
