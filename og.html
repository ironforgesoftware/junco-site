<!DOCTYPE html>
<html lang="en" class="js">
  <head>
    <meta charset="utf-8">
    <title>og-image source — screenshot at 1200×630</title>
    <link rel="stylesheet" href="site/styles.css">
    <style>
      html,
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }
      .og {
        width: 1200px;
        height: 630px;
        padding: 72px 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        border-top: 6px solid var(--accent);
      }
      .og .kicker {
        font-size: 1.125rem;
      }
      .og h1 {
        font-size: 4.5rem;
        line-height: 1.25;
        margin-block: 0.5rem 1.5rem;
      }
      .og .pos {
        color: var(--ink-muted);
        font-size: 1.375rem;
        max-width: 46ch;
      }
      .og .foot-row {
        display: flex;
        align-items: center;
        gap: 1.5ch;
        font-size: 1.25rem;
        color: var(--ink-muted);
      }
      .og .mark {
        display: inline-block;
        width: 72px;
        height: 72px;
      }
    </style>
  </head>
  <body>
    <div class="og">
      <div>
        <p class="kicker">junco · task-queue worker · v0.9.0 · MIT</p>
        <h1>Issues in.<br>Pull requests out.</h1>
        <p class="pos">
          A harness-agnostic task-queue worker that turns Markdown tickets into git pull requests
          by driving a coding agent.
        </p>
      </div>
      <p class="foot-row">
        <img class="mark" src="site/assets/junco.svg" alt="">
        junco.ironforgesoftware.com
      </p>
    </div>
  </body>
</html>
