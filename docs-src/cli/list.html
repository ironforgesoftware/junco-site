<p>Lists tickets newest-first per queue box — <code>inbox</code> | <code>processing</code> | <code>done</code> | <code>failed</code> — with terminal statuses; pass a box name to show just that one. Read-only: nothing moves on disk.</p>
<pre class="cmd">junco list</pre>
<pre class="cmd">junco list failed</pre>
